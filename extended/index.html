<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="HiGHS extended JavaScript API demo using a persistent solver instance in a Web Worker">
<title>HiGHS Extended API Demo — Persistent Native Solver</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --text: #111827;
    --text-muted: #6b7280;
    --accent: #8000ff;
    --accent-hover: #6b00d6;
    --accent-light: #f3e8ff;
    --link-color: #8000ff;
    --border: #e5e7eb;
    --border-hover: #d1d5db;
    --code-bg: #fafafa;
    --radius: 6px;
    --radius-lg: 10px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Monaco, monospace;
    color-scheme: light;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.6;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Header Navigation ── */
  .top-nav {
    max-width: 1040px;
    margin: 0 auto;
    padding: 2.25rem 1.5rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1rem;
    font-weight: 600;
  }

  .top-nav a {
    color: var(--link-color);
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: opacity 0.15s ease;
  }

  .top-nav a:hover {
    opacity: 0.75;
  }

  .top-nav-right {
    display: flex;
    gap: 1.75rem;
  }

  /* ── Hero Section ── */
  .hero {
    text-align: center;
    padding: 4.5rem 1.5rem 2.5rem;
    max-width: 840px;
    margin: 0 auto;
  }

  .hero h1 {
    font-size: clamp(2.1rem, 4.5vw, 2.6rem);
    font-weight: 700;
    color: #111111;
    letter-spacing: -0.015em;
    line-height: 1.2;
    margin-bottom: 1.25rem;
  }

  .hero h1 u {
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-thickness: 2px;
  }

  .hero p {
    font-size: 1.05rem;
    color: #111111;
    line-height: 1.5;
    font-weight: 400;
  }

  .browser-mark {
    background-color: #ffff00;
    color: #000000;
    padding: 0 4px;
    font-weight: inherit;
  }

  /* ── Divider & Section Title ── */
  .section-divider {
    border: 0;
    border-top: 1px solid var(--border);
    max-width: 960px;
    margin: 4.5rem auto 3rem;
  }

  /* ── Main Container ── */
  .container {
    max-width: 1040px;
    margin: 0 auto;
    padding: 0 1.5rem 5rem;
  }

  /* ── Status Banner ── */
  .status-banner {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1.25rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* ── Controls Row ── */
  .controls-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 2rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 1rem;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .control-group label {
    font-size: 0.825rem;
    font-weight: 500;
    color: #4b5563;
  }

  select, input[type=number], input[type=text] {
    font-family: var(--font-sans);
    font-size: 0.85rem;
    padding: 0.4rem 0.65rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s ease;
  }

  select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1rem;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--accent);
    color: #ffffff;
  }

  .btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  .btn.ghost {
    background: transparent;
    color: var(--accent);
    border-color: var(--border);
  }

  .btn.ghost:hover {
    background: var(--code-bg);
    border-color: var(--accent);
  }

  /* ── Card Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  @media (max-width: 820px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .card-header {
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fafafa;
  }

  .card-body {
    padding: 1.25rem;
  }

  textarea, pre {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 0.825rem;
    line-height: 1.5;
    border: 1px solid var(--border);
    outline: none;
    resize: vertical;
    background: var(--code-bg);
    color: var(--text);
    padding: 0.75rem 0.85rem;
    border-radius: var(--radius);
    tab-size: 2;
  }

  textarea {
    min-height: 280px;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  pre {
    min-height: 280px;
    max-height: 520px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .doc-link {
    font-size: 0.8rem;
    color: var(--link-color);
    text-decoration: underline;
    font-weight: 500;
  }

  .doc-link:hover {
    opacity: 0.8;
  }

  @media (max-width: 640px) {
    .top-nav {
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }
    .hero {
      padding: 2.5rem 1rem 1.5rem;
    }
    .container {
      padding: 0 1rem 3rem;
    }
  }
</style>
</head>
<body>

<!-- ═══════════ TOP NAVIGATION ═══════════ -->
<nav class="top-nav">
  <div class="top-nav-left">
    <a href="https://github.com/lovasoa/highs-js" target="_blank" rel="noopener">Github project page</a>
  </div>
  <div class="top-nav-right">
    <a href="../">Demo</a>
    <a href="https://www.npmjs.com/package/highs" target="_blank" rel="noopener">NPM package</a>
    <a href="https://highs.dev/" target="_blank" rel="noopener">HiGHS solver</a>
  </div>
</nav>

<!-- ═══════════ HERO ═══════════ -->
<header class="hero">
  <h1><u>HiGHS</u> extended JavaScript API</h1>
  <p>Persistent native model with direct mutation in a Web Worker directly in your <mark class="browser-mark">browser</mark></p>
</header>

<hr class="section-divider">

<div class="container">

  <!-- ═══════════ STATUS BANNER ═══════════ -->
  <div class="status-banner" id="mode">
    Loading solver…
  </div>

  <!-- ═══════════ CONTROLS ═══════════ -->
  <div class="controls-card">
    <div class="controls">
      <button class="btn ghost" id="load" type="button">Load edited LP</button>

      <div class="control-group">
        <label for="cost">x1 objective cost</label>
        <input id="cost" type="number" value="1" step="0.25">
      </div>

      <div class="control-group">
        <label for="upper">x1 upper bound</label>
        <input id="upper" type="number" value="40" min="0" step="1">
      </div>

      <button class="btn" id="rerun" type="button">Apply changes and solve</button>
    </div>
  </div>

  <!-- ═══════════ GRID ═══════════ -->
  <div class="grid">
    <div class="card">
      <div class="card-header">
        <span>LP Model</span>
        <a class="doc-link" href="../docs/api/" target="_blank">API docs ↗</a>
      </div>
      <div class="card-body">
        <textarea id="problem" spellcheck="false">Maximize
 obj: x1 + 2 x2 + 4 x3 + x4
Subject To
 c1: - x1 + x2 + x3 + 10 x4 <= 20
 c2: x1 - 4 x2 + x3 <= 30
 c3: x2 - 0.5 x4 = 0
Bounds
 0 <= x1 <= 40
 2 <= x4 <= 3
End</textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>Result</span>
      </div>
      <div class="card-body">
        <pre id="result" aria-live="polite">Waiting…</pre>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script src="demo.js"></script>
</body>
</html>
