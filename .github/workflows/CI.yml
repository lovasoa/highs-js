on: [push, pull_request]

name: Continuous Integration

jobs:
  build:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - uses: mymindstorm/setup-emsdk@v16
        with: { version: "5.0.7" }
      - run: npm ci
      - name: build
        run: npm run build
      - name: test
        run: npm test
