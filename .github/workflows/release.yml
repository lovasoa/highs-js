name: Create a release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build:
    name: Create a release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - id: versions
        name: Read canonical toolchain versions
        run: |
          . ./.env
          echo "emsdk=$EMSDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "node=$NODE_VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: |
            build/CMakeFiles
            build/highs/CMakeFiles
            build/lib
          key: ${{ runner.os }}-emsdk-${{ steps.versions.outputs.emsdk }}-cmake-${{ hashFiles('HiGHS/**/*.cmake', 'HiGHS/**/CMakeLists.txt', 'HiGHS/highs/**/*.cpp', 'HiGHS/highs/**/*.h', 'build.sh') }}
          restore-keys: |
            ${{ runner.os }}-emsdk-${{ steps.versions.outputs.emsdk }}-cmake-
      - uses: mymindstorm/setup-emsdk@v16
        with: { version: "${{ steps.versions.outputs.emsdk }}" }
      - uses: actions/setup-node@v6
        with:
          node-version: "${{ steps.versions.outputs.node }}"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - name: verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p 'require(\"./package.json\").version')"
      - name: verify generated C API inventory
        run: npm run check:api
      - name: build
        run: npm run build
      - name: test
        env:
          HIGHS_REQUIRE_EXTENDED: "1"
        run: npm test
      - name: verify packed package
        run: npm run test:package
      - run: cp build/highs.* demo/
      - run: cp -R docs demo/docs
      - name: publish the package to NPM
        run: npm publish --provenance
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/highs.wasm
            build/highs.js
            build/highs.mjs
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
      - name: Deploy demo and documentation
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: demo
